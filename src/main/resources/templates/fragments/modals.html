<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<!-- Floating popups / modals (rendered at body level) -->
<th:block th:fragment="modals">
    <!-- Message action popup (Reply / Forward) -->
    <div class="msg-menu" id="msgMenu">
        <button type="button" class="msg-menu-item" id="msgMenuReply">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="9 17 4 12 9 7"></polyline>
                <path d="M20 18v-2a4 4 0 0 0-4-4H4"></path>
            </svg>
            Reply
        </button>
        <button type="button" class="msg-menu-item" id="msgMenuForward">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 17 20 12 15 7"></polyline>
                <path d="M4 18v-2a4 4 0 0 1 4-4h12"></path>
            </svg>
            Forward
        </button>
        <button type="button" class="msg-menu-item" id="msgMenuRemoveMe">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 6 6 18"></path>
                <path d="m6 6 12 12"></path>
            </svg>
            Remove for me
        </button>
        <button type="button" class="msg-menu-item danger" id="msgMenuRemoveEveryone">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="3 6 5 6 21 6"></polyline>
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
            </svg>
            Remove for everyone
        </button>
    </div>

    <!-- Styled dialog (replaces native alert) -->
    <div class="dialog-overlay" id="appDialog">
        <div class="dialog" role="alertdialog" aria-modal="true" aria-labelledby="appDialogTitle">
            <div class="dialog-icon" id="appDialogIcon"></div>
            <h3 id="appDialogTitle"></h3>
            <p id="appDialogMessage"></p>
            <div class="dialog-actions" id="appDialogActions"></div>
        </div>
    </div>

    <!-- Settings: edit profile -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal">
            <div class="modal-header">
                <h3>Edit profile</h3>
                <button class="modal-close" onclick="closeSettings()" aria-label="Close">&times;</button>
            </div>
            <div class="settings-body">
                <div class="settings-avatar-row">
                    <div class="settings-avatar" id="settingsAvatar"></div>
                    <div>
                        <button type="button" class="settings-photo-btn" id="settingsPhotoBtn">Change photo</button>
                        <input type="file" id="settingsPhotoInput" accept="image/*" style="display: none;">
                    </div>
                </div>
                <div class="form-group">
                    <label for="settingsFirstName">First name</label>
                    <input type="text" id="settingsFirstName" placeholder="First name">
                </div>
                <div class="form-group">
                    <label for="settingsLastName">Last name</label>
                    <input type="text" id="settingsLastName" placeholder="Last name">
                </div>
                <div class="form-group">
                    <label for="settingsUsername">Username</label>
                    <input type="text" id="settingsUsername" disabled>
                    <div class="form-hint">Username can't be changed.</div>
                </div>
                <div class="form-error" id="settingsError" style="display: none;"></div>
            </div>
            <div class="settings-footer">
                <button type="button" class="dialog-btn" onclick="closeSettings()">Cancel</button>
                <button type="button" class="dialog-btn primary" id="settingsSaveBtn" onclick="saveSettings()">Save changes</button>
            </div>
        </div>
    </div>

    <!-- Forward target picker -->
    <div class="modal-overlay" id="forwardModal">
        <div class="modal">
            <div class="modal-header">
                <h3>Forward to…</h3>
                <button class="modal-close" onclick="closeForwardModal()" aria-label="Close">&times;</button>
            </div>
            <div class="modal-preview" id="forwardPreview"></div>
            <div class="modal-list" id="forwardList"></div>
        </div>
    </div>
</th:block>
</body>
</html>
