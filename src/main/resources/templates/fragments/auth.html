<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<!-- Auth card: login / sign up / verify views -->
<div id="authSection" class="auth-container" th:fragment="auth">
    <!-- Login -->
    <div class="auth-view" id="loginView">
        <h2>Welcome back</h2>
        <p class="auth-sub">Sign in to continue the conversation.</p>
        <div class="form-group">
            <label for="username">Username, email or phone</label>
            <input type="text" id="username" placeholder="Enter username, email or phone" autocomplete="username">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <div class="password-wrapper">
                <input type="password" id="password" placeholder="Enter password" autocomplete="current-password">
                <button type="button" class="password-toggle" onclick="togglePassword(this)" aria-label="Show password">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                </button>
            </div>
        </div>
        <button class="auth-button" id="loginButton" onclick="login()">Sign In</button>
        <div class="oauth2-divider" style="text-align: center; margin: 15px 0; color: var(--text-muted); font-size: 14px;">or</div>
        <a href="/oauth2/authorization/google" class="auth-button" style="background-color: var(--bg-primary); color: var(--text-primary); border: 1px solid var(--border-color); text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 10px;">
            <svg width="18" height="18" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Sign in with Google
        </a>
        <p class="auth-switch">Don't have an account?
            <button type="button" class="auth-link" onclick="showSignupView()">Sign up</button>
        </p>
    </div>

    <!-- Sign up -->
    <div class="auth-view" id="signupView" style="display: none;">
        <h2>Create account</h2>
        <p class="auth-sub">Join the conversation in a minute.</p>
        <div class="form-row">
            <div class="form-group">
                <label for="suFirstName">First name</label>
                <input type="text" id="suFirstName" placeholder="First name" autocomplete="given-name">
            </div>
            <div class="form-group">
                <label for="suLastName">Last name</label>
                <input type="text" id="suLastName" placeholder="Last name" autocomplete="family-name">
            </div>
        </div>
        <div class="form-group">
            <label for="suEmail">Email</label>
            <input type="email" id="suEmail" placeholder="you@example.com" autocomplete="email">
        </div>
        <div class="form-group">
            <label for="suUsername">Username</label>
            <input type="text" id="suUsername" placeholder="Choose a username" autocomplete="username">
        </div>
        <div class="form-group">
            <label for="suPhone">Phone <span class="form-optional">(optional)</span></label>
            <div class="phone-input-group">
                <div class="phone-code" id="suPhoneCode" data-dial="+84">
                    <button type="button" class="phone-code-trigger" id="suPhoneCodeTrigger" aria-haspopup="listbox" aria-expanded="false" aria-label="Country code">
                        <span class="fi fi-vn" id="suPhoneCodeFlag"></span>
                        <span class="phone-code-dial" id="suPhoneCodeDial">+84</span>
                        <svg class="phone-code-caret" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="6 9 12 15 18 9"></polyline>
                        </svg>
                    </button>
                    <div class="phone-code-menu" id="suPhoneCodeMenu" role="listbox">
                        <input type="text" class="phone-code-search" id="suPhoneCodeSearch" placeholder="Search country or code…" autocomplete="off">
                        <ul class="phone-code-list" id="suPhoneCodeList"></ul>
                    </div>
                </div>
                <input type="tel" id="suPhone" placeholder="912 345 678" autocomplete="tel">
            </div>
        </div>
        <div class="form-group">
            <label for="suPassword">Password</label>
            <div class="password-wrapper">
                <input type="password" id="suPassword" placeholder="Create a password" autocomplete="new-password">
                <button type="button" class="password-toggle" onclick="togglePassword(this)" aria-label="Show password">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                </button>
            </div>
        </div>
        <div class="form-group">
            <label for="suConfirm">Confirm password</label>
            <div class="password-wrapper">
                <input type="password" id="suConfirm" placeholder="Re-enter password" autocomplete="new-password">
                <button type="button" class="password-toggle" onclick="togglePassword(this)" aria-label="Show password">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                </button>
            </div>
        </div>
        <div class="form-error" id="signupError" style="display: none;"></div>
        <button class="auth-button" id="signupButton" onclick="signup()">Create account</button>
        <p class="auth-switch">Already have an account?
            <button type="button" class="auth-link" onclick="showLoginView()">Sign in</button>
        </p>
    </div>

    <!-- Verify email (OTP) -->
    <div class="auth-view" id="otpView" style="display: none;">
        <button type="button" class="auth-back" onclick="showSignupView()">&larr; Back</button>
        <h2>Verify your email</h2>
        <p class="auth-sub">Enter the 6-digit code we sent to <strong id="otpEmail"></strong>.</p>
        <div class="form-group">
            <label>Verification code</label>
            <div class="otp-group" id="otpGroup">
                <input type="text" class="otp-box" inputmode="numeric" maxlength="1" autocomplete="one-time-code" aria-label="Digit 1">
                <input type="text" class="otp-box" inputmode="numeric" maxlength="1" aria-label="Digit 2">
                <input type="text" class="otp-box" inputmode="numeric" maxlength="1" aria-label="Digit 3">
                <input type="text" class="otp-box" inputmode="numeric" maxlength="1" aria-label="Digit 4">
                <input type="text" class="otp-box" inputmode="numeric" maxlength="1" aria-label="Digit 5">
                <input type="text" class="otp-box" inputmode="numeric" maxlength="1" aria-label="Digit 6">
            </div>
        </div>
        <div class="form-error" id="otpError" style="display: none;"></div>
        <button class="auth-button" id="otpButton" onclick="verifyOtp()">Verify</button>
        <p class="auth-switch">Didn't get the code?
            <button type="button" class="auth-link" id="resendBtn" onclick="resendOtp()">Resend code</button>
        </p>
    </div>
</div>
</body>
</html>
