<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <style>
        :root {
            --bg: #f5f5f6;
            --surface: #ffffff;
            --surface-2: #fafafa;
            --border: #ececec;
            --border-2: #e4e4e7;
            --text: #18181b;
            --text-dim: #71717a;
            --text-faint: #a1a1aa;
            --accent: #18181b;
            --accent-soft: #f4f4f5;
            --on-accent: #ffffff;
            --online: #22c55e;
            --success-color: #22c55e; /* alias referenced inline by chat header JS */
            --danger: #ef4444;
            --scrollbar: #dcdce0;
            --scrollbar-hover: #c4c4ca;
            --radius: 16px;
            --radius-sm: 12px;
            --shadow-sm: 0 1px 2px rgba(24, 24, 27, 0.04);
            --shadow: 0 1px 3px rgba(24, 24, 27, 0.06), 0 8px 24px -12px rgba(24, 24, 27, 0.10);
            --font: 'Manrope', system-ui, -apple-system, sans-serif;
        }

        /* ===== Dark theme ===== */
        [data-theme="dark"] {
            --bg: #09090b;
            --surface: #18181b;
            --surface-2: #1c1c1f;
            --border: #27272a;
            --border-2: #2e2e33;
            --text: #fafafa;
            --text-dim: #a1a1aa;
            --text-faint: #71717a;
            --accent: #fafafa;
            --accent-soft: #27272a;
            --on-accent: #18181b;
            --online: #22c55e;
            --success-color: #22c55e;
            --danger: #f87171;
            --scrollbar: #3f3f46;
            --scrollbar-hover: #52525b;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
            --shadow: 0 1px 3px rgba(0, 0, 0, 0.4), 0 12px 32px -12px rgba(0, 0, 0, 0.6);
        }

        html { background: var(--bg); }
        body, .auth-container, .chat-wrapper, .sidebar, .main-chat,
        .message-input, .message-content, .user-item, .profile, .profile-menu {
            transition: background-color 0.25s ease, border-color 0.25s ease, color 0.25s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body { height: 100%; }

        body {
            font-family: var(--font);
            color: var(--text);
            line-height: 1.5;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
        }

        .container {
            width: 100%;
            max-width: 1320px;
            margin: 0 auto;
            padding: 20px clamp(16px, 3vw, 28px) 24px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* ===== Sidebar footer / profile ===== */
        .sidebar-footer {
            position: relative;
            padding: 10px;
            border-top: 1px solid var(--border);
            flex: 0 0 auto;
        }

        .profile {
            display: flex;
            align-items: center;
            gap: 11px;
            padding: 8px 10px;
            border-radius: 12px;
            cursor: pointer;
            user-select: none;
            transition: background 0.12s ease;
        }
        .profile:hover { background: rgba(127, 127, 127, 0.08); }
        .profile.menu-open { background: rgba(127, 127, 127, 0.10); }

        .profile-avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: var(--accent);
            color: var(--on-accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.95rem;
            flex: 0 0 auto;
            background-size: cover;
            background-position: center;
            overflow: hidden;
        }
        .profile-avatar.has-image { color: transparent; }

        .profile-info { flex: 1; min-width: 0; }
        #currentUsername {
            font-weight: 600;
            font-size: 0.88rem;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .profile-sub { font-size: 0.74rem; color: var(--text-faint); }

        .profile-chevron {
            color: var(--text-faint);
            flex: 0 0 auto;
            transition: transform 0.18s ease;
        }
        .profile.menu-open .profile-chevron { transform: rotate(180deg); }

        /* ===== Profile popup menu ===== */
        .profile-menu {
            position: absolute;
            left: 10px;
            right: 10px;
            bottom: calc(100% - 4px);
            background: var(--surface);
            border: 1px solid var(--border-2);
            border-radius: 14px;
            box-shadow: var(--shadow);
            padding: 6px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(6px);
            transition: opacity 0.16s ease, transform 0.16s ease, visibility 0.16s;
            z-index: 30;
        }
        .profile-menu.open {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .profile-menu-item {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 11px;
            padding: 10px 11px;
            background: none;
            border: none;
            border-radius: 9px;
            cursor: pointer;
            font-family: var(--font);
            font-size: 0.86rem;
            font-weight: 600;
            color: var(--text);
            text-align: left;
            transition: background 0.12s ease;
        }
        .profile-menu-item:hover { background: var(--accent-soft); }
        .profile-menu-item svg { color: var(--text-dim); flex: 0 0 auto; }
        .profile-menu-item.danger { color: var(--danger); }
        .profile-menu-item.danger svg { color: var(--danger); }

        .profile-menu-item .theme-state {
            margin-left: auto;
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--text-faint);
        }

        .profile-menu-divider {
            height: 1px;
            background: var(--border);
            margin: 5px 4px;
        }

        /* ===== Auth card ===== */
        .auth-container {
            max-width: 380px;
            width: 100%;
            margin: auto;
            padding: 36px 34px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            box-shadow: var(--shadow);
        }

        .auth-container h2 {
            font-weight: 800;
            font-size: 1.5rem;
            letter-spacing: -0.03em;
            margin-bottom: 6px;
        }
        .auth-sub {
            color: var(--text-faint);
            font-size: 0.9rem;
            margin-bottom: 26px;
        }

        .form-group { margin-bottom: 16px; }

        .form-group label {
            display: block;
            margin-bottom: 7px;
            font-weight: 600;
            font-size: 0.82rem;
            color: var(--text-dim);
        }

        .form-group input {
            width: 100%;
            padding: 12px 14px;
            background: var(--surface);
            border: 1px solid var(--border-2);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-family: var(--font);
            font-size: 0.92rem;
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
        }
        .form-group input::placeholder { color: var(--text-faint); }
        .form-group input:focus {
            outline: none;
            border-color: var(--text);
            box-shadow: 0 0 0 3px rgba(24, 24, 27, 0.06);
        }

        .auth-button {
            width: 100%;
            margin-top: 8px;
            padding: 13px;
            background: var(--accent);
            color: var(--on-accent);
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-family: var(--font);
            font-size: 0.92rem;
            font-weight: 700;
            transition: opacity 0.15s ease, transform 0.1s ease;
        }
        .auth-button:hover { opacity: 0.88; }
        .auth-button:active { transform: scale(0.99); }

        /* ===== Chat shell ===== */
        .chat-wrapper {
            display: none;
            flex-direction: row;
            flex: 1;
            min-height: 0;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        /* ===== Sidebar ===== */
        .sidebar {
            width: 300px;
            display: flex;
            flex-direction: column;
            background: var(--surface-2);
            border-right: 1px solid var(--border);
        }

        .sidebar-header {
            padding: 18px 18px 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .sidebar-header span:first-child {
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: -0.01em;
        }

        .connection-status {
            display: flex;
            align-items: center;
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-faint);
        }
        .status-indicator {
            display: inline-block;
            width: 7px;
            height: 7px;
            border-radius: 50%;
            margin-right: 6px;
            background-color: var(--text-faint);
            transition: background-color 0.2s ease;
        }
        .status-connected { background-color: var(--online); }

        .user-list {
            flex: 1;
            overflow-y: auto;
            padding: 6px 10px 10px;
        }

        .user-item {
            padding: 9px 10px;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.12s ease;
            display: flex;
            align-items: center;
            position: relative;
            margin-bottom: 1px;
        }
        .user-item:hover { background: rgba(24, 24, 27, 0.04); }
        .user-item.active { background: rgba(24, 24, 27, 0.06); }

        .user-avatar-container { position: relative; margin-right: 11px; }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--accent-soft);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.95rem;
        }

        .online-dot {
            position: absolute;
            bottom: -1px;
            right: -1px;
            width: 11px;
            height: 11px;
            border-radius: 50%;
            background-color: #d4d4d8;
            border: 2px solid var(--surface-2);
        }
        .online-dot.online { background-color: var(--online); }

        .user-details { flex: 1; min-width: 0; }
        .user-name {
            font-weight: 600;
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .user-status { font-size: 0.76rem; color: var(--text-faint); }

        /* ===== Main chat ===== */
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            background: var(--surface);
        }

        .active-chat-header {
            padding: 16px 22px;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            color: var(--text-faint);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
            min-height: 66px;
        }
        .active-chat-body {
            flex: 1;
            min-width: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .mobile-back {
            display: none; /* hidden on desktop, shown in the mobile media query */
            align-items: center;
            justify-content: center;
            width: 38px;
            height: 38px;
            margin-left: -8px;
            border: none;
            background: none;
            border-radius: 10px;
            color: var(--text);
            cursor: pointer;
            flex: 0 0 auto;
            transition: background 0.12s ease;
        }
        .mobile-back:hover { background: var(--accent-soft); }
        .mobile-back:active { transform: scale(0.94); }

        .header-user-info { display: flex; align-items: center; color: var(--text); }
        .header-user-info > div > div:first-child { font-weight: 700; font-size: 0.95rem; }

        .chat-messages {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            flex: 1 1 auto;
            overflow-y: auto;
            padding: 22px;
            min-height: 0;
        }

        .message {
            position: relative;
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
            max-width: 68%;
            width: fit-content;
            animation: fade 0.2s ease both;
        }
        .message-sent { align-self: flex-end; align-items: flex-end; }
        .message-received { align-self: flex-start; align-items: flex-start; }

        .message-content {
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 0.9rem;
            word-break: break-word;
            line-height: 1.5;
        }
        .message-sent .message-content {
            background: var(--accent);
            color: var(--on-accent);
            border-bottom-right-radius: 5px;
        }
        .message-received .message-content {
            background: var(--accent-soft);
            color: var(--text);
            border-bottom-left-radius: 5px;
        }

        .message-info {
            font-size: 0.7rem;
            margin-bottom: 4px;
            color: var(--text-faint);
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 0 2px;
        }
        .message-sent .message-info { flex-direction: row-reverse; }

        .read-status {
            font-size: 0.66rem;
            color: var(--text-dim);
            font-weight: 600;
        }

        .typing-indicator {
            padding: 2px 24px 10px;
            font-size: 0.8rem;
            color: var(--text-faint);
            display: none;
        }

        .media-container {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 6px;
        }
        .media-container img {
            border-radius: 12px;
            max-width: 170px;
            max-height: 170px;
            object-fit: cover;
            cursor: pointer;
            border: 1px solid var(--border);
            transition: opacity 0.15s ease;
        }
        .media-container img:hover { opacity: 0.9; }
        .media-container video {
            border-radius: 12px;
            max-width: 220px;
            max-height: 220px;
            border: 1px solid var(--border);
        }

        /* ===== Message actions: kebab button on a bubble ===== */
        /* Wraps the bubble + media so the kebab centers on them, not the timestamp line */
        .message-stack {
            position: relative;
            display: flex;
            flex-direction: column;
        }
        .message-sent .message-stack { align-items: flex-end; }
        .message-received .message-stack { align-items: flex-start; }

        .msg-menu-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 26px;
            height: 26px;
            border: 1px solid var(--border-2);
            background: var(--surface);
            color: var(--text-dim);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            box-shadow: var(--shadow-sm);
            transition: opacity 0.12s ease, background 0.12s ease, color 0.12s ease;
        }
        .message:hover .msg-menu-btn,
        .message.menu-active .msg-menu-btn { opacity: 1; }
        .msg-menu-btn:hover { background: var(--accent-soft); color: var(--text); }
        .message-received .msg-menu-btn { right: -32px; }
        .message-sent .msg-menu-btn { left: -32px; }

        /* ===== Message actions: popup menu (fixed, body-level) ===== */
        .msg-menu {
            position: fixed;
            z-index: 100;
            min-width: 152px;
            background: var(--surface);
            border: 1px solid var(--border-2);
            border-radius: 12px;
            box-shadow: var(--shadow);
            padding: 6px;
            display: none;
        }
        .msg-menu.open { display: block; }
        .msg-menu-item {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 11px;
            background: none;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-family: var(--font);
            font-size: 0.86rem;
            font-weight: 600;
            color: var(--text);
            text-align: left;
            transition: background 0.12s ease;
        }
        .msg-menu-item:hover { background: var(--accent-soft); }
        .msg-menu-item svg { color: var(--text-dim); flex: 0 0 auto; }

        /* ===== Forward modal ===== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 200;
            padding: 20px;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            width: 100%;
            max-width: 360px;
            max-height: 72vh;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 18px;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .modal-header {
            padding: 16px 18px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .modal-header h3 { font-size: 1rem; font-weight: 700; letter-spacing: -0.01em; }
        .modal-close {
            border: none;
            background: none;
            cursor: pointer;
            color: var(--text-faint);
            font-size: 1.35rem;
            line-height: 1;
            width: 30px;
            height: 30px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-close:hover { background: var(--accent-soft); color: var(--text); }
        .modal-preview {
            padding: 10px 18px;
            font-size: 0.8rem;
            color: var(--text-dim);
            border-bottom: 1px solid var(--border);
            background: var(--surface-2);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .modal-list { overflow-y: auto; padding: 8px; }
        .forward-item {
            display: flex;
            align-items: center;
            gap: 11px;
            padding: 9px 10px;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.12s ease;
        }
        .forward-item:hover { background: var(--accent-soft); }
        .forward-item .user-avatar { width: 36px; height: 36px; font-size: 0.9rem; }
        .forward-item-name { font-weight: 600; font-size: 0.9rem; }
        .forward-empty { padding: 16px; color: var(--text-faint); font-size: 0.85rem; text-align: center; }

        /* ===== Reply: quoted bar inside a bubble ===== */
        .reply-quote {
            border-left: 3px solid currentColor;
            padding: 3px 9px;
            margin-bottom: 6px;
            border-radius: 6px;
            background: rgba(127, 127, 127, 0.14);
            opacity: 0.92;
            max-width: 100%;
        }
        .reply-quote-sender {
            font-weight: 700;
            font-size: 0.72rem;
            margin-bottom: 1px;
        }
        .reply-quote-text {
            font-size: 0.8rem;
            max-width: 240px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            opacity: 0.88;
        }

        /* ===== Reply: compose bar above the input ===== */
        .reply-bar {
            display: none; /* toggled to flex when replying */
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            margin-bottom: 10px;
            background: var(--surface-2);
            border: 1px solid var(--border-2);
            border-left: 3px solid var(--accent);
            border-radius: 10px;
        }
        .reply-bar-content { flex: 1; min-width: 0; }
        .reply-bar-sender {
            font-size: 0.74rem;
            font-weight: 700;
            color: var(--text);
        }
        .reply-bar-text {
            font-size: 0.8rem;
            color: var(--text-dim);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .reply-bar-close {
            border: none;
            background: none;
            cursor: pointer;
            color: var(--text-faint);
            font-size: 1.25rem;
            line-height: 1;
            width: 27px;
            height: 27px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 0 0 auto;
            transition: background 0.12s ease, color 0.12s ease;
        }
        .reply-bar-close:hover { background: var(--accent-soft); color: var(--text); }

        /* ===== Composer ===== */
        .chat-input {
            display: flex;
            flex-direction: column;
            padding: 14px 18px 18px;
            border-top: 1px solid var(--border);
            flex: 0 0 auto;
        }
        .message-input-container { display: flex; align-items: center; gap: 10px; }

        .message-input {
            flex: 1;
            padding: 12px 16px;
            background: var(--surface-2);
            border: 1px solid var(--border-2);
            border-radius: 12px;
            color: var(--text);
            font-family: var(--font);
            font-size: 0.92rem;
            outline: none;
            transition: border-color 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
        }
        .message-input::placeholder { color: var(--text-faint); }
        .message-input:focus {
            border-color: var(--text);
            background: var(--surface);
            box-shadow: 0 0 0 3px rgba(24, 24, 27, 0.05);
        }

        .send-button {
            background: var(--accent);
            color: var(--on-accent);
            border: none;
            border-radius: 11px;
            width: 44px;
            height: 44px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 0 0 auto;
            transition: opacity 0.15s ease, transform 0.1s ease;
        }
        .send-button:hover:not(:disabled) { opacity: 0.88; }
        .send-button:active:not(:disabled) { transform: scale(0.95); }
        .send-button:disabled {
            background: var(--accent-soft);
            color: var(--text-faint);
            cursor: not-allowed;
        }

        .media-input-container { display: flex; align-items: center; margin-top: 10px; }
        .media-label {
            display: flex;
            align-items: center;
            gap: 7px;
            color: var(--text-dim);
            padding: 6px 10px;
            border-radius: 9px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            transition: background 0.12s ease, color 0.12s ease;
        }
        .media-label:hover { background: var(--accent-soft); color: var(--text); }
        .media-input { display: none; }

        .file-count {
            background: var(--accent);
            color: var(--on-accent);
            border-radius: 50%;
            min-width: 18px;
            height: 18px;
            padding: 0 4px;
            font-size: 0.68rem;
            font-weight: 700;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .preview-container {
            display: none;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
            max-height: 120px;
            overflow-y: auto;
            padding: 2px;
        }
        .preview-item {
            position: relative;
            width: 78px;
            height: 78px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border-2);
        }
        .preview-item img { width: 100%; height: 100%; object-fit: cover; }
        .preview-remove {
            position: absolute;
            top: 3px;
            right: 3px;
            background-color: rgba(24, 24, 27, 0.6);
            color: #fff;
            border: none;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 13px;
            line-height: 1;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .preview-remove:hover { background-color: var(--danger); }

        /* ===== Scrollbars ===== */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb {
            background: var(--scrollbar);
            border-radius: 999px;
            border: 2px solid transparent;
            background-clip: padding-box;
        }
        ::-webkit-scrollbar-thumb:hover { background: var(--scrollbar-hover); background-clip: padding-box; }

        /* ===== Animations ===== */
        @keyframes fade {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (prefers-reduced-motion: reduce) {
            * { animation: none !important; transition: none !important; }
        }

        /* ===== Responsive: mobile master/detail ===== */
        @media (max-width: 768px) {
            .container { padding: 0; height: 100vh; height: 100dvh; }

            .chat-wrapper {
                position: relative;
                border: none;
                border-radius: 0;
                box-shadow: none;
            }

            /* Sidebar (contact list) is the main page, full width */
            .sidebar {
                width: 100%;
                border-right: none;
            }

            /* Chat detail slides in over the list from the right */
            .main-chat {
                position: absolute;
                inset: 0;
                background: var(--surface);
                transform: translateX(100%);
                transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
                z-index: 20;
            }
            .chat-wrapper.chat-active .main-chat { transform: translateX(0); }

            /* Show the back arrow only on mobile */
            .mobile-back { display: flex; }

            .active-chat-header { padding: 14px 16px; }
            .chat-messages { padding: 16px; }

            .message-received .msg-menu-btn { right: -30px; }
            .message-sent .msg-menu-btn { left: -30px; }
        }

        @media (prefers-reduced-motion: reduce) {
            .main-chat { transition: none !important; }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Login Form -->
    <div id="authSection" class="auth-container">
        <h2>Welcome back</h2>
        <p class="auth-sub">Sign in to continue the conversation.</p>
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="Enter username">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter password">
        </div>
        <button class="auth-button" onclick="login()">Sign In</button>
    </div>

    <!-- Chat Interface -->
    <div id="chatSection" class="chat-wrapper">
        <!-- Sidebar: Contact List -->
        <div class="sidebar">
            <div class="sidebar-header">
                <span>Contacts</span>
                <div class="connection-status">
                    <span class="status-indicator" id="connectionIndicator"></span>
                    <span id="connectionText">Disconnected</span>
                </div>
            </div>
            <div class="user-list" id="userList">
                <!-- Users will be populated here -->
            </div>

            <!-- Current user / account menu -->
            <div class="sidebar-footer">
                <div class="profile-menu" id="profileMenu">
                    <button type="button" class="profile-menu-item" onclick="toggleDarkMode()">
                        <svg id="themeIcon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                        </svg>
                        <span id="themeLabel">Dark mode</span>
                        <span class="theme-state" id="themeState">Off</span>
                    </button>
                    <div class="profile-menu-divider"></div>
                    <button type="button" class="profile-menu-item danger" onclick="logout()">
                        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                            <polyline points="16 17 21 12 16 7"></polyline>
                            <line x1="21" y1="12" x2="9" y2="12"></line>
                        </svg>
                        Logout
                    </button>
                </div>

                <div class="profile" id="userDisplay" style="display: none;" onclick="toggleProfileMenu(event)">
                    <div class="profile-avatar" id="profileAvatar">?</div>
                    <div class="profile-info">
                        <div id="currentUsername"></div>
                        <div class="profile-sub">Active now</div>
                    </div>
                    <svg class="profile-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="18 15 12 9 6 15"></polyline>
                    </svg>
                </div>
            </div>
        </div>

        <!-- Main Chat Area -->
        <div class="main-chat">
            <div class="active-chat-header">
                <button class="mobile-back" onclick="showContactList()" aria-label="Back to contacts">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                </button>
                <div class="active-chat-body" id="activeChatHeader">
                    Select a user to start chatting
                </div>
            </div>

            <div id="chat-messages" class="chat-messages">
                <!-- Messages will be populated here -->
            </div>

            <div id="typingIndicator" class="typing-indicator">
                Someone is typing...
            </div>

            <div class="chat-input" id="chatInputArea" style="display: none;">
                <div class="reply-bar" id="replyBar">
                    <div class="reply-bar-content">
                        <div class="reply-bar-sender" id="replyBarSender"></div>
                        <div class="reply-bar-text" id="replyBarText"></div>
                    </div>
                    <button class="reply-bar-close" onclick="cancelReply()" aria-label="Cancel reply">&times;</button>
                </div>

                <div class="preview-container" id="filePreviewContainer"></div>

                <div class="message-input-container">
                    <input type="text" id="messageInput" class="message-input" placeholder="Type a message..." oninput="handleTyping()">
                    <button id="sendButton" class="send-button" onclick="sendMessage()" disabled>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>

                <div class="media-input-container">
                    <label for="mediaFiles" class="media-label">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            <circle cx="8.5" cy="8.5" r="1.5"></circle>
                            <polyline points="21 15 16 10 5 21"></polyline>
                        </svg>
                        Attach Media
                        <span class="file-count" id="fileCount">0</span>
                    </label>
                    <input type="file" id="mediaFiles" class="media-input" multiple accept="image/*,video/*">
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Message action popup (Reply / Forward) -->
<div class="msg-menu" id="msgMenu">
    <button type="button" class="msg-menu-item" id="msgMenuReply">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 17 4 12 9 7"></polyline>
            <path d="M20 18v-2a4 4 0 0 0-4-4H4"></path>
        </svg>
        Reply
    </button>
    <button type="button" class="msg-menu-item" id="msgMenuForward">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 17 20 12 15 7"></polyline>
            <path d="M4 18v-2a4 4 0 0 1 4-4h12"></path>
        </svg>
        Forward
    </button>
</div>

<!-- Forward target picker -->
<div class="modal-overlay" id="forwardModal">
    <div class="modal">
        <div class="modal-header">
            <h3>Forward to…</h3>
            <button class="modal-close" onclick="closeForwardModal()" aria-label="Close">&times;</button>
        </div>
        <div class="modal-preview" id="forwardPreview"></div>
        <div class="modal-list" id="forwardList"></div>
    </div>
</div>

<script>
    let stompClient = null;
    let connected = false;
    let currentUser = null;
    let activeRecipientId = null;
    let selectedFiles = [];
    let onlineUsers = new Set();
    let isTypingTimeout = null;
    let activeContactUsername = null;
    let replyingTo = null; // { messageId, senderName, snippet }
    let contactsCache = []; // raw contact list, used by the forward picker
    let menuTarget = null;  // message the action popup currently targets
    let menuActiveEl = null; // the .message element whose kebab is active

    // DOM elements
    const authSection = document.getElementById('authSection');
    const chatSection = document.getElementById('chatSection');
    const userDisplay = document.getElementById('userDisplay');
    const currentUsernameSpan = document.getElementById('currentUsername');
    const profileAvatar = document.getElementById('profileAvatar');
    const profileMenu = document.getElementById('profileMenu');
    const themeLabel = document.getElementById('themeLabel');
    const themeState = document.getElementById('themeState');

    const userListElement = document.getElementById('userList');
    const activeChatHeader = document.getElementById('activeChatHeader');
    const chatInputArea = document.getElementById('chatInputArea');
    const messageInput = document.getElementById('messageInput');
    const mediaFilesInput = document.getElementById('mediaFiles');
    const chatMessages = document.getElementById('chat-messages');
    const connectionIndicator = document.getElementById('connectionIndicator');
    const connectionText = document.getElementById('connectionText');
    const sendButton = document.getElementById('sendButton');
    const fileCount = document.getElementById('fileCount');
    const filePreviewContainer = document.getElementById('filePreviewContainer');
    const typingIndicator = document.getElementById('typingIndicator');
    const replyBar = document.getElementById('replyBar');
    const replyBarSender = document.getElementById('replyBarSender');
    const replyBarText = document.getElementById('replyBarText');
    const msgMenu = document.getElementById('msgMenu');
    const forwardModal = document.getElementById('forwardModal');
    const forwardList = document.getElementById('forwardList');
    const forwardPreview = document.getElementById('forwardPreview');

    // Check for existing session
    window.onload = function() {
        applyTheme(localStorage.getItem('chat_theme') || 'light');

        const savedUser = localStorage.getItem('chat_user');
        if (savedUser) {
            currentUser = JSON.parse(savedUser);
            showChat();
        }
    };

    // ===== Dark mode =====
    function applyTheme(theme) {
        const isDark = theme === 'dark';
        document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
        localStorage.setItem('chat_theme', isDark ? 'dark' : 'light');
        if (themeLabel) themeLabel.textContent = isDark ? 'Light mode' : 'Dark mode';
        if (themeState) themeState.textContent = isDark ? 'On' : 'Off';
    }

    function toggleDarkMode() {
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        applyTheme(isDark ? 'light' : 'dark');
    }

    // ===== Profile popup menu =====
    function toggleProfileMenu(event) {
        if (event) event.stopPropagation();
        const open = profileMenu.classList.toggle('open');
        userDisplay.classList.toggle('menu-open', open);
    }

    function closeProfileMenu() {
        profileMenu.classList.remove('open');
        userDisplay.classList.remove('menu-open');
    }

    // Close the menu when clicking anywhere outside it
    document.addEventListener('click', function(e) {
        if (profileMenu.classList.contains('open') &&
            !profileMenu.contains(e.target) && !userDisplay.contains(e.target)) {
            closeProfileMenu();
        }
    });
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closeProfileMenu();
    });

    function login() {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        fetch('/v1/api/auth/sign-in', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        })
        .then(response => response.json())
        .then(data => {
            if (data.code === 200) {
                currentUser = data.data; // SignInResponse
                localStorage.setItem('chat_user', JSON.stringify(currentUser));
                showChat();
            } else {
                alert(data.message || "Login failed");
            }
        })
        .catch(error => {
            console.error("Login error:", error);
            alert("An error occurred during login");
        });
    }

    function logout() {
        closeProfileMenu();
        if (stompClient) {
            stompClient.disconnect();
        }
        localStorage.removeItem('chat_user');
        currentUser = null;
        activeRecipientId = null;
        showAuth();
    }

    function showChat() {
        authSection.style.display = 'none';
        chatSection.style.display = 'flex';
        userDisplay.style.display = 'flex';
        currentUsernameSpan.textContent = currentUser.username;
        renderProfileAvatar();

        loadOnlineUsers().then(() => {
            if (!currentUser) return; // session was rejected during the online-users fetch
            loadContacts();
            connect();
        });
    }

    // Show the user's profile picture if they have one, else their initial
    function renderProfileAvatar() {
        if (!currentUser) return;
        if (currentUser.profilePicture) {
            profileAvatar.textContent = '';
            profileAvatar.style.backgroundImage = `url("${currentUser.profilePicture}")`;
            profileAvatar.classList.add('has-image');
        } else {
            profileAvatar.style.backgroundImage = '';
            profileAvatar.classList.remove('has-image');
            profileAvatar.textContent = currentUser.username.charAt(0).toUpperCase();
        }
    }

    function showAuth() {
        authSection.style.display = 'block';
        chatSection.style.display = 'none';
        chatSection.classList.remove('chat-active');
        userDisplay.style.display = 'none';
        updateConnectionStatus(false);
    }

    // Clear the session and bounce to login when the token is rejected (401)
    function handleSessionExpired() {
        if (!currentUser) return; // already handled
        if (stompClient) {
            try { stompClient.disconnect(); } catch (e) { /* ignore */ }
        }
        localStorage.removeItem('chat_user');
        currentUser = null;
        activeRecipientId = null;
        showAuth();
        alert("Your session has expired. Please sign in again.");
    }

    // fetch wrapper that injects the bearer token and intercepts expired/invalid tokens
    function authFetch(url, options = {}) {
        const opts = { ...options };
        opts.headers = { ...(options.headers || {}), 'Authorization': 'Bearer ' + currentUser.token };
        return fetch(url, opts).then(response => {
            if (response.status === 401) {
                handleSessionExpired();
                throw new Error('Session expired');
            }
            return response;
        });
    }

    function loadOnlineUsers() {
        return authFetch('/v1/api/users/online', { method: 'GET' })
        .then(res => res.json())
        .then(data => {
            if (data.code === 200) {
                onlineUsers = new Set(data.data.map(id => String(id)));
            }
        })
        .catch(err => console.error("Failed to load online users:", err));
    }

    function loadContacts() {
        authFetch('/v1/api/users', { method: 'GET' })
        .then(res => res.json())
        .then(data => {
            if (data.code === 200) {
                renderContacts(data.data.content || []);
            }
        })
        .catch(err => console.error("Failed to load contacts:", err));
    }

    function renderContacts(users) {
        contactsCache = users || [];
        userListElement.innerHTML = '';
        users.forEach(user => {
            if (user.userId == currentUser.id) return; // Don't show self

            const isOnline = onlineUsers.has(String(user.userId));

            const userItem = document.createElement('div');
            userItem.className = 'user-item';
            userItem.id = `user-${user.userId}`;
            userItem.onclick = () => selectContact(user);
            if (activeRecipientId == user.userId) userItem.classList.add('active');

            const avatarContainer = document.createElement('div');
            avatarContainer.className = 'user-avatar-container';

            const avatar = document.createElement('div');
            avatar.className = 'user-avatar';
            avatar.textContent = user.username.charAt(0).toUpperCase();

            const dot = document.createElement('div');
            dot.className = `online-dot ${isOnline ? 'online' : ''}`;
            dot.id = `dot-${user.userId}`;

            avatarContainer.appendChild(avatar);
            avatarContainer.appendChild(dot);

            const details = document.createElement('div');
            details.className = 'user-details';

            const name = document.createElement('div');
            name.className = 'user-name';
            name.textContent = user.username;

            const status = document.createElement('div');
            status.className = 'user-status';
            status.id = `status-text-${user.userId}`;
            status.textContent = isOnline ? 'Online' : 'Offline';

            details.appendChild(name);
            details.appendChild(status);
            userItem.appendChild(avatarContainer);
            userItem.appendChild(details);

            userListElement.appendChild(userItem);
        });
    }

    function selectContact(user) {
        // On mobile, reveal the chat detail pane (slides over the contact list)
        chatSection.classList.add('chat-active');
        if (activeRecipientId == user.userId) return;

        // Highlight active user
        document.querySelectorAll('.user-item').forEach(el => el.classList.remove('active'));
        const userEl = document.getElementById(`user-${user.userId}`);
        if (userEl) userEl.classList.add('active');

        activeRecipientId = user.userId;
        activeContactUsername = user.username;
        cancelReply(); // a pending reply belongs to the previous conversation
        const isOnline = onlineUsers.has(String(user.userId));

        activeChatHeader.innerHTML = `
            <div class="header-user-info">
                <div class="user-avatar" style="width: 30px; height: 30px; margin-right: 10px;">${user.username.charAt(0).toUpperCase()}</div>
                <div>
                    <div>${user.username}</div>
                    <div style="font-size: 0.7rem; font-weight: normal; color: ${isOnline ? 'var(--success-color)' : '#666'}">${isOnline ? 'Online' : 'Offline'}</div>
                </div>
            </div>
        `;

        chatInputArea.style.display = 'flex';
        chatMessages.innerHTML = ''; // Clear current messages
        typingIndicator.style.display = 'none';
        updateSendButtonState();

        loadChatHistory(user.userId);
        sendReadReceipt(user.userId);
    }

    // Mobile: go back from the chat detail to the contact list
    function showContactList() {
        chatSection.classList.remove('chat-active');
    }

    // ===== Reply =====
    function startReply(messageId, senderName, text, mediaUrls) {
        if (messageId == null) return;
        let snippet = (text && text.trim() !== '')
            ? text.trim()
            : ((mediaUrls && mediaUrls.length > 0) ? '📷 Media' : '');
        replyingTo = { messageId, senderName, snippet };
        renderReplyBar();
        messageInput.focus();
    }

    function cancelReply() {
        replyingTo = null;
        renderReplyBar();
    }

    function renderReplyBar() {
        if (!replyingTo) {
            replyBar.style.display = 'none';
            return;
        }
        replyBarSender.textContent = `Replying to ${replyingTo.senderName}`;
        replyBarText.textContent = replyingTo.snippet;
        replyBar.style.display = 'flex';
    }

    // ===== Message action popup (Reply / Forward) =====
    function openMsgMenu(event, target, btnEl) {
        event.stopPropagation();
        menuTarget = target;

        if (menuActiveEl) menuActiveEl.classList.remove('menu-active');
        menuActiveEl = btnEl.closest('.message');
        if (menuActiveEl) menuActiveEl.classList.add('menu-active');

        // Show first so we can measure, then clamp within the viewport
        msgMenu.classList.add('open');
        const rect = btnEl.getBoundingClientRect();
        const menuW = msgMenu.offsetWidth;
        const menuH = msgMenu.offsetHeight;

        let left = rect.left;
        let top = rect.bottom + 6;
        if (left + menuW > window.innerWidth - 8) left = window.innerWidth - menuW - 8;
        if (left < 8) left = 8;
        if (top + menuH > window.innerHeight - 8) top = rect.top - menuH - 6;
        if (top < 8) top = 8;

        msgMenu.style.left = left + 'px';
        msgMenu.style.top = top + 'px';
    }

    function closeMsgMenu() {
        msgMenu.classList.remove('open');
        if (menuActiveEl) {
            menuActiveEl.classList.remove('menu-active');
            menuActiveEl = null;
        }
    }

    document.getElementById('msgMenuReply').onclick = function() {
        if (menuTarget) startReply(menuTarget.messageId, menuTarget.senderName, menuTarget.text, menuTarget.mediaUrls);
        closeMsgMenu();
    };
    document.getElementById('msgMenuForward').onclick = function() {
        if (menuTarget) openForwardModal(menuTarget);
        closeMsgMenu();
    };

    // Dismiss the popup on outside click, scroll, resize or Escape
    document.addEventListener('click', function(e) {
        if (msgMenu.classList.contains('open') && !msgMenu.contains(e.target)) closeMsgMenu();
    });
    window.addEventListener('resize', closeMsgMenu);
    chatMessages.addEventListener('scroll', closeMsgMenu);
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') { closeMsgMenu(); closeForwardModal(); }
    });
    forwardModal.addEventListener('click', function(e) {
        if (e.target === forwardModal) closeForwardModal(); // click on backdrop
    });

    // ===== Forward =====
    function openForwardModal(target) {
        menuTarget = target; // retain target for the forward action
        forwardPreview.textContent = buildForwardPreview(target);
        renderForwardList();
        forwardModal.classList.add('open');
    }

    function closeForwardModal() {
        forwardModal.classList.remove('open');
    }

    function buildForwardPreview(target) {
        if (target.text && target.text.trim() !== '') {
            const t = target.text.trim();
            return 'Forwarding: ' + (t.length > 60 ? t.slice(0, 60) + '…' : t);
        }
        if (target.mediaUrls && target.mediaUrls.length > 0) return 'Forwarding: 📷 Media';
        return 'Forwarding message';
    }

    function renderForwardList() {
        forwardList.innerHTML = '';
        const others = contactsCache.filter(u => u.userId != currentUser.id);
        if (others.length === 0) {
            forwardList.innerHTML = '<div class="forward-empty">No contacts available</div>';
            return;
        }
        others.forEach(user => {
            const item = document.createElement('div');
            item.className = 'forward-item';

            const avatar = document.createElement('div');
            avatar.className = 'user-avatar';
            avatar.textContent = user.username.charAt(0).toUpperCase();

            const name = document.createElement('div');
            name.className = 'forward-item-name';
            name.textContent = user.username;

            item.appendChild(avatar);
            item.appendChild(name);
            item.onclick = () => forwardMessage(user);
            forwardList.appendChild(item);
        });
    }

    function forwardMessage(user) {
        if (!menuTarget) return;
        if (!connected || !stompClient) { alert('Not connected. Please try again.'); return; }

        const chatMessage = {
            recipientId: user.userId,
            message: menuTarget.text || '',
            senderVisibility: 1,
            recipientVisibility: 1,
            mediaUrls: menuTarget.mediaUrls || [],
            replyToMessageId: null
        };

        const headers = { 'Authorization': 'Bearer ' + currentUser.token };
        stompClient.send("/app/chat", headers, JSON.stringify(chatMessage));

        // If forwarding into the conversation that's currently open, echo it locally
        if (activeRecipientId == user.userId) {
            showMessage({ ...chatMessage, senderId: currentUser.id, isRead: false }, true);
        }

        closeForwardModal();
    }

    function loadChatHistory(recipientId) {
        authFetch(`/v1/api/message/${recipientId}?size=50`, { method: 'GET' })
        .then(res => res.json())
        .then(data => {
            if (data.code === 200 && data.data.content) {
                const messages = [...data.data.content].reverse();
                messages.forEach(msg => {
                    const isSender = msg.senderId == currentUser.id;
                    showMessage(msg, isSender);
                });
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }
        })
        .catch(err => console.error("Failed to load history:", err));
    }

    function updateConnectionStatus(isConnected) {
        connected = isConnected;
        if (isConnected) {
            connectionIndicator.classList.add('status-connected');
            connectionText.textContent = 'Connected';
        } else {
            connectionIndicator.classList.remove('status-connected');
            connectionText.textContent = 'Disconnected';
        }
        updateSendButtonState();
    }

    function updateSendButtonState() {
        const hasContent = messageInput.value.trim() !== '' || selectedFiles.length > 0;
        const canSend = connected && activeRecipientId != null && hasContent;
        sendButton.disabled = !canSend;
    }

    // Connect to WebSocket
    function connect() {
        if (!currentUser) return;
        if (stompClient !== null) stompClient.disconnect();

        const socket = new SockJS('/ws');
        stompClient = Stomp.over(socket);
        stompClient.debug = null;

        const headers = { 'Authorization': 'Bearer ' + currentUser.token };

        stompClient.connect(headers, function (frame) {
            updateConnectionStatus(true);

            // Subscribe to private messages
            stompClient.subscribe(`/user/${currentUser.id}/queue/messages`, function (message) {
                const messageData = JSON.parse(message.body);
                if (messageData.senderId == activeRecipientId) {
                    showMessage(messageData, false);
                    sendReadReceipt(activeRecipientId);
                }
            });

            // Subscribe to typing notifications
            stompClient.subscribe(`/user/${currentUser.id}/queue/typing`, function (message) {
                const typingData = JSON.parse(message.body);
                if (typingData.senderId == activeRecipientId) {
                    typingIndicator.textContent = `${typingData.username} is typing...`;
                    typingIndicator.style.display = typingData.isTyping ? 'block' : 'none';
                    chatMessages.scrollTop = chatMessages.scrollHeight;
                }
            });

            // Subscribe to read receipts
            stompClient.subscribe(`/user/${currentUser.id}/queue/read-receipt`, function (message) {
                const readData = JSON.parse(message.body);
                if (readData.readBy == activeRecipientId) {
                    updateMessagesToRead();
                }
            });

            // Subscribe to public status updates
            stompClient.subscribe('/topic/public.status', function (message) {
                const statusData = JSON.parse(message.body);
                updateUserStatus(statusData.userId, statusData.status === 'ONLINE');
            });

        }, function(error) {
            console.error('Connection error:', error);
            updateConnectionStatus(false);
            if (currentUser) setTimeout(connect, 5000);
        });
    }

    function updateUserStatus(userId, isOnline) {
        if (isOnline) onlineUsers.add(String(userId));
        else onlineUsers.delete(String(userId));

        const dot = document.getElementById(`dot-${userId}`);
        const statusText = document.getElementById(`status-text-${userId}`);

        if (dot) {
            if (isOnline) dot.classList.add('online');
            else dot.classList.remove('online');
        }

        if (statusText) {
            statusText.textContent = isOnline ? 'Online' : 'Offline';
        }

        // Update header if chatting with this user
        if (activeRecipientId == userId) {
            const headerStatus = activeChatHeader.querySelector('div div:last-child');
            if (headerStatus) {
                headerStatus.textContent = isOnline ? 'Online' : 'Offline';
                headerStatus.style.color = isOnline ? 'var(--success-color)' : '#666';
            }
        }
    }

    function handleTyping() {
        updateSendButtonState();
        if (!connected || !activeRecipientId) return;

        stompClient.send("/app/chat.typing", {}, JSON.stringify({
            recipientId: activeRecipientId,
            username: currentUser.username,
            isTyping: true
        }));

        if (isTypingTimeout) clearTimeout(isTypingTimeout);
        isTypingTimeout = setTimeout(() => {
            stompClient.send("/app/chat.typing", {}, JSON.stringify({
                recipientId: activeRecipientId,
                username: currentUser.username,
                isTyping: false
            }));
        }, 2000);
    }

    function sendReadReceipt(recipientId) {
        if (!connected || !recipientId) return;
        stompClient.send("/app/chat.read", {}, JSON.stringify({
            recipientId: recipientId
        }));
    }

    function updateMessagesToRead() {
        const unreadSentMessages = document.querySelectorAll('.message-sent .read-status');
        unreadSentMessages.forEach(el => {
            el.textContent = 'Read';
        });
    }

    // Send message
    function sendMessage() {
        if (!connected || !currentUser || !activeRecipientId) return;

        const hasContent = messageInput.value.trim() !== '' || selectedFiles.length > 0;
        if (!hasContent) return;

        const chatMessage = {
            recipientId: activeRecipientId,
            message: messageInput.value,
            senderVisibility: 1,
            recipientVisibility: 1,
            mediaUrls: [],
            replyToMessageId: replyingTo ? replyingTo.messageId : null
        };

        // Snapshot reply info for optimistic rendering (resetInput clears replyingTo)
        const replySnapshot = replyingTo ? {
            replyToSenderUsername: replyingTo.senderName,
            replyToSnippet: replyingTo.snippet
        } : {};

        const headers = { 'Authorization': 'Bearer ' + currentUser.token };

        if (selectedFiles.length > 0) {
            const formData = new FormData();
            for (const file of selectedFiles) formData.append("files", file);

            uploadMediaFiles(formData).then(mediaUrls => {
                chatMessage.mediaUrls = mediaUrls;
                stompClient.send("/app/chat", headers, JSON.stringify(chatMessage));
                showMessage({...chatMessage, ...replySnapshot, senderId: currentUser.id, isRead: false}, true);
                resetInput();
            }).catch(error => {
                console.error("Error uploading files:", error);
                alert("Failed to upload media files.");
            });
        } else {
            stompClient.send("/app/chat", headers, JSON.stringify(chatMessage));
            showMessage({...chatMessage, ...replySnapshot, senderId: currentUser.id, isRead: false}, true);
            resetInput();
        }
    }

    function resetInput() {
        messageInput.value = '';
        clearFileSelection();
        cancelReply();
        updateSendButtonState();

        if (isTypingTimeout) clearTimeout(isTypingTimeout);
        stompClient.send("/app/chat.typing", {}, JSON.stringify({
            recipientId: activeRecipientId,
            username: currentUser.username,
            isTyping: false
        }));
    }

    function uploadMediaFiles(formData) {
        return new Promise((resolve, reject) => {
            authFetch('/v1/api/media/chat', {
                method: 'POST',
                body: formData
            })
            .then(response => {
                if (!response.ok) throw new Error("Failed to upload media files");
                return response.json();
            })
            .then(data => resolve(data))
            .catch(error => reject(error));
        });
    }

    // Show message in chat
    function showMessage(messageData, isSender = false) {
        const messageElement = document.createElement('div');
        messageElement.className = isSender ? 'message message-sent' : 'message message-received';

        const infoElement = document.createElement('div');
        infoElement.className = 'message-info';

        let timeString = "";
        const timestamp = messageData.sentAt || messageData.createdAt;
        if (timestamp) {
            const date = new Date(timestamp);
            timeString = `${date.getHours().toString().padStart(2, '0')}:${date.getMinutes().toString().padStart(2, '0')}`;
        } else {
            const now = new Date();
            timeString = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
        }

        infoElement.textContent = isSender ? `You • ${timeString}` : `${timeString}`;

        if (isSender) {
            const readStatus = document.createElement('span');
            readStatus.className = 'read-status';
            readStatus.textContent = messageData.isRead ? 'Read' : 'Sent';
            infoElement.appendChild(readStatus);
        }

        messageElement.appendChild(infoElement);

        // Bubble + media live in a stack so the kebab can center on them (not the info line)
        const stack = document.createElement('div');
        stack.className = 'message-stack';

        const hasText = messageData.message && messageData.message.trim() !== '';
        const hasReply = messageData.replyToMessageId != null &&
            (messageData.replyToSnippet != null || messageData.replyToSenderUsername != null);

        if (hasText || hasReply) {
            const contentElement = document.createElement('div');
            contentElement.className = 'message-content';

            if (hasReply) {
                const quote = document.createElement('div');
                quote.className = 'reply-quote';

                const quoteSender = document.createElement('div');
                quoteSender.className = 'reply-quote-sender';
                quoteSender.textContent = messageData.replyToSenderUsername || 'Message';

                const quoteText = document.createElement('div');
                quoteText.className = 'reply-quote-text';
                quoteText.textContent = messageData.replyToSnippet || '';

                quote.appendChild(quoteSender);
                quote.appendChild(quoteText);
                contentElement.appendChild(quote);
            }

            if (hasText) {
                const textEl = document.createElement('div');
                textEl.className = 'message-text';
                textEl.textContent = messageData.message;
                contentElement.appendChild(textEl);
            }

            stack.appendChild(contentElement);
        }

        if (messageData.mediaUrls && messageData.mediaUrls.length > 0) {
            const mediaContainer = document.createElement('div');
            mediaContainer.className = 'media-container';

            for (const url of messageData.mediaUrls) {
                if (url.match(/\.(jpeg|jpg|gif|png|webp)$/i)) {
                    const img = document.createElement('img');
                    img.src = url;
                    img.onclick = () => window.open(url, '_blank');
                    mediaContainer.appendChild(img);
                } else if (url.match(/\.(mp4|webm|ogg)$/i)) {
                    const video = document.createElement('video');
                    video.src = url;
                    video.controls = true;
                    mediaContainer.appendChild(video);
                }
            }
            stack.appendChild(mediaContainer);
        }

        // Message actions (kebab) — needs a persisted message id to act on
        const msgId = messageData.messageId != null ? messageData.messageId : messageData.id;
        if (msgId != null) {
            const menuBtn = document.createElement('button');
            menuBtn.className = 'msg-menu-btn';
            menuBtn.title = 'Message actions';
            menuBtn.setAttribute('aria-label', 'Message actions');
            menuBtn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="1.6"></circle><circle cx="12" cy="12" r="1.6"></circle><circle cx="12" cy="19" r="1.6"></circle></svg>';
            const senderName = isSender ? 'You' : (messageData.senderUsername || activeContactUsername || 'Them');
            const target = {
                messageId: msgId,
                senderName: senderName,
                text: messageData.message,
                mediaUrls: messageData.mediaUrls
            };
            menuBtn.onclick = (e) => openMsgMenu(e, target, menuBtn);
            stack.appendChild(menuBtn);
        }

        messageElement.appendChild(stack);
        chatMessages.appendChild(messageElement);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    // Handle file selection (triggered by the <input change> event)
    function handleFileSelection() {
        selectedFiles = Array.from(mediaFilesInput.files);
        renderFilePreviews();
    }

    // Render previews from the current selectedFiles array (decoupled from the input)
    function renderFilePreviews() {
        fileCount.textContent = selectedFiles.length;
        fileCount.style.display = selectedFiles.length > 0 ? 'flex' : 'none';
        filePreviewContainer.innerHTML = '';

        selectedFiles.forEach((file, index) => {
            const previewItem = document.createElement('div');
            previewItem.className = 'preview-item';

            if (file.type.startsWith('image/')) {
                const img = document.createElement('img');
                img.src = URL.createObjectURL(file);
                previewItem.appendChild(img);
            } else {
                const img = document.createElement('img');
                img.src = 'https://via.placeholder.com/80?text=File';
                previewItem.appendChild(img);
            }

            const removeButton = document.createElement('button');
            removeButton.className = 'preview-remove';
            removeButton.innerHTML = '×';
            removeButton.onclick = (e) => {
                e.preventDefault();
                removeFile(index);
            };

            previewItem.appendChild(removeButton);
            filePreviewContainer.appendChild(previewItem);
        });

        filePreviewContainer.style.display = selectedFiles.length > 0 ? 'flex' : 'none';
        updateSendButtonState();
    }

    function removeFile(index) {
        selectedFiles.splice(index, 1);
        renderFilePreviews();
    }

    function clearFileSelection() {
        mediaFilesInput.value = '';
        selectedFiles = [];
        fileCount.textContent = '0';
        fileCount.style.display = 'none';
        filePreviewContainer.innerHTML = '';
        filePreviewContainer.style.display = 'none';
        updateSendButtonState();
    }

    // Event listeners
    messageInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter' && !sendButton.disabled) {
            sendMessage();
        }
    });
    mediaFilesInput.addEventListener('change', handleFileSelection);

</script>
</body>
</html>
