<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flag-icons@7.2.3/css/flag-icons.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <link rel="stylesheet" href="/css/chat.css">
</head>
<body>
<div class="container">
    <!-- Auth card: login / sign up / verify -->
    <div th:replace="~{fragments/auth :: auth}"></div>

    <!-- Chat Interface -->
    <div id="chatSection" class="chat-wrapper">
        <div th:replace="~{fragments/sidebar :: sidebar}"></div>
        <div th:replace="~{fragments/chat :: chat}"></div>
        <div th:replace="~{fragments/info-panel :: infoPanel}"></div>
    </div>
</div>

<!-- Floating popups / modals -->
<div th:replace="~{fragments/modals :: modals}"></div>

<script src="/js/chat.js"></script>
</body>
</html>
